<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" aria-label="AI-Powered Niche Historical Fashion Illustration Generator">
  <defs>
    <linearGradient id="gradient-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#50E3C2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient-secondary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5A623;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F8E71C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient-background" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F9F9F9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#gradient-background)" />

  <!-- Central AI Icon -->
  <g transform="translate(400, 300)">
    <circle cx="0" cy="0" r="80" fill="url(#gradient-primary)" />
    <path d="M-30,-30 L30,-30 L30,30 L-30,30 Z" fill="#FFFFFF" transform="rotate(45)" />
    <circle cx="0" cy="0" r="20" fill="#FFFFFF" />
    <path d="M-15,-5 L-5,0 L-15,5 Z" fill="#4A90E2" transform="rotate(-45)" />
    <path d="M15,-5 L5,0 L15,5 Z" fill="#4A90E2" transform="rotate(135)" />
    <path d="M-5,-15 L0,-5 L5,-15 Z" fill="#4A90E2" transform="rotate(-135)" />
    <path d="M-5,15 L0,5 L5,15 Z" fill="#4A90E2" transform="rotate(45)" />
  </g>

  <!-- Fashion Element 1: Dress Silhouette -->
  <g transform="translate(150, 250) scale(0.8)">
    <path d="M0 0
             C100 -50, 100 -150, 0 -200
             C-100 -150, -100 -50, 0 0
             Z" fill="rgba(255,255,255,0.8)" stroke="#333333" stroke-width="2" />
    <rect x="-20" y="0" width="40" height="100" fill="#F5A623" />
    <ellipse cx="0" cy="150" rx="50" ry="25" fill="#F8E71C" />
  </g>

  <!-- Fashion Element 2: Hat/Accessory -->
  <g transform="translate(650, 180) scale(0.6)">
    <ellipse cx="0" cy="0" rx="40" ry="25" fill="#50E3C2" />
    <rect x="-15" y="25" width="30" height="50" fill="#4A90E2" />
    <circle cx="0" cy="75" r="15" fill="#FFFFFF" />
  </g>

  <!-- Historical Icon: Quill Pen -->
  <g transform="translate(100, 450)">
    <path d="M0,0 C5,0 10,5 10,10 L10,50 C10,60 5,65 0,65 L-10,65 C-5,65 -10,60 -10,50 L-10,10 C-10,5 -5,0 0,0 Z" fill="#A0A0A0" />
    <path d="M10,10 L15,20 L10,30 Z" fill="#A0A0A0" />
    <path d="M-10,10 L-15,20 L-10,30 Z" fill="#A0A0A0" />
    <path d="M-5,30 L0,50 L5,30 Z" fill="#A0A0A0" />
  </g>

  <!-- Historical Icon: Magnifying Glass -->
  <g transform="translate(700, 450)">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#A0A0A0" stroke-width="3" />
    <path d="M30,30 L50,50" stroke="#A0A0A0" stroke-width="3" />
    <circle cx="0" cy="0" r="5" fill="#A0A0A0" />
  </g>

  <!-- Text Overlay: Generator Name -->
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#333333" text-anchor="middle">
    AI-Powered Niche Historical
  </text>
  <text x="400" y="85" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#333333" text-anchor="middle">
    Fashion Illustration Generator
  </text>
</svg>